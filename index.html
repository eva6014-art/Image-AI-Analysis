<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Factory - 專業穩定版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-up { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
            }, []);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImageContent({
                            data: reader.result.split(',')[1],
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { setError("請設定 API Key。"); setIsSettingsOpen(true); return; }
                if (!imageContent.data) { setError("請選擇圖片。"); return; }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                // 使用正式版 v1 接口
                const model = "gemini-1.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度解析圖片內容。請以繁體中文描述風格與情節。必須以純 JSON 格式回傳，不可有額外開場白，格式如下：{\"summary\":\"關於風格的簡述\",\"chinese_details\":{\"style\":\"風格細節描述\",\"subject\":\"情節細節描述\"},\"english_prompts\":[\"prompt_key_1\",\"prompt_key_2\"]}" },
                            { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                        ]
                    }]
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        const msg = data.error?.message || response.statusText;
                        throw new Error(`API 錯誤 (${response.status}): ${msg}`);
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("AI 產出為空，請檢查圖片或 API 狀態。");

                    // 嘗試清洗並解析 JSON
                    try {
                        const jsonString = rawText.replace(/```json|```/gi, "").trim();
                        const parsed = JSON.parse(jsonString);
                        setAnalysis(parsed);
                    } catch (pErr) {
                        console.error("RAW TEXT:", rawText);
                        throw new Error("JSON 解析失敗，AI 回傳了非結構化文字。請再試一次。");
                    }

                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const content = `解析摘要：${analysis.summary}\n\n風格：${analysis.chinese_details?.style}\n情節：${analysis.chinese_details?.subject}`;
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-8 md:py-16">
                    {/* API Key 設定區 */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 mb-8 overflow-hidden">
                        <div 
                            onClick={() => setIsSettingsOpen(!isSettingsOpen)}
                            className="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors"
                        >
                            <span className="font-bold text-slate-500 tracking-widest text-[10px] uppercase italic">🛡️ API 安全設定 {apiKey && "✅"}</span>
                            <span className="text-xs">{isSettingsOpen ? "▲" : "▼"}</span>
                        </div>
                        {isSettingsOpen && (
                            <div className="p-4 pt-0">
                                <input 
                                    type="password"
                                    placeholder="輸入您的 Gemini API Key"
                                    value={apiKey}
                                    onChange={(e) => {
                                        const val = e.target.value.trim();
                                        setApiKey(val);
                                        localStorage.setItem('gemini_api_key', val);
                                    }}
                                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs"
                                />
                                <div className="mt-3 flex justify-between text-[10px] text-slate-400 font-medium">
                                    <span>本地存儲，安全不外洩</span>
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-600 underline">獲取密鑰</a>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Logo 與標題 */}
                    <div className="text-center mb-12">
                        <div className="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-[1.5rem] shadow-2xl mb-6 transform rotate-3">
                            <span className="text-2xl font-bold">A</span>
                        </div>
                        <h1 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Prompt Factory</h1>
                        <p className="text-slate-400 text-[10px] font-black tracking-[0.3em] uppercase mt-2">v1.2 Stable Engine</p>
                    </div>

                    {/* 主要上傳區 */}
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 mb-8">
                        <div 
                            onClick={() => document.getElementById('upload-input').click()}
                            className={`border-2 border-dashed rounded-[2rem] min-h-[300px] flex items-center justify-center cursor-pointer transition-all ${selectedImage ? 'bg-slate-50 border-indigo-200' : 'border-slate-300 hover:border-indigo-400'}`}
                        >
                            {selectedImage ? (
                                <img src={selectedImage} className="max-h-[260px] object-contain rounded-xl" />
                            ) : (
                                <div className="text-center space-y-2 opacity-30">
                                    <p className="text-4xl">📁</p>
                                    <p className="font-bold text-sm">選擇解析影像</p>
                                </div>
                            )}
                            <input id="upload-input" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                        </div>
                        
                        <button 
                            onClick={analyzeImage}
                            disabled={isLoading || !imageContent.data}
                            className={`w-full mt-8 py-5 rounded-2xl font-black text-xl transition-all shadow-xl active:scale-95 ${isLoading || !imageContent.data ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}
                        >
                            {isLoading ? "ANALYZING..." : "開始分析"}
                        </button>
                    </div>

                    {/* 錯誤反饋 */}
                    {error && (
                        <div className="p-5 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-xs font-bold mb-8 animate-up flex gap-3">
                            <span>❌</span>
                            <div className="break-words w-full overflow-hidden">
                                <p className="mb-1 uppercase tracking-wider">Error Report</p>
                                <p className="opacity-70 font-mono">{error}</p>
                            </div>
                        </div>
                    )}

                    {/* 成功結果 */}
                    {analysis && (
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden animate-up">
                            <div className="p-8 border-b bg-slate-50 flex justify-between items-center">
                                <h2 className="font-black text-slate-800 tracking-widest italic uppercase">Analysis Result</h2>
                                <button onClick={copyToClipboard} className={`px-5 py-2 rounded-xl text-[10px] font-black transition-all ${copied ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-900 text-white'}`}>
                                    {copied ? "COPIED" : "COPY DATA"}
                                </button>
                            </div>
                            <div className="p-8 md:p-12 space-y-12 text-slate-700 leading-relaxed">
                                <p className="font-bold text-2xl tracking-tight text-slate-900 leading-tight">{analysis.summary}</p>
                                
                                <div className="space-y-10">
                                    <section className="pl-5 border-l-4 border-indigo-500">
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">繁體中文描述</h3>
                                        <div className="space-y-4">
                                            <p className="text-base"><b>＊ 風格構圖：</b>{analysis.chinese_details?.style}</p>
                                            <p className="text-base"><b>＊ 主體情節：</b>{analysis.chinese_details?.subject}</p>
                                        </div>
                                    </section>

                                    <section>
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4">Prompt Keywords</h3>
                                        <div className="bg-slate-900 p-6 rounded-3xl font-mono text-sm text-indigo-300 shadow-inner">
                                            {Array.isArray(analysis.english_prompts) ? analysis.english_prompts.join(', ') : analysis.english_prompts}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center text-slate-300 text-[8px] font-black tracking-[0.4em] uppercase">
                        Enterprise AI Framework v1.2
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
