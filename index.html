<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 快速圖像分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .drop-zone--over { border-color: #3b82f6; background-color: #eff6ff; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-gray-900 mb-2 tracking-tight">AI 快速圖像分析</h1>
            <p class="text-gray-500">優化壓縮技術，秒級生成關鍵字與摘要</p>
        </header>

        <!-- API Key -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-8 flex flex-wrap items-center gap-4">
            <div class="flex-1 min-w-[280px]">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Gemini API Key</label>
                <input type="password" id="apiKeyInput" placeholder="輸入 API Key..." 
                       class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="pt-5">
                <button id="saveKeyBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all">確認儲存</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Side: Upload -->
            <div class="lg:col-span-5 space-y-6">
                <div id="dropZone" class="group border-2 border-dashed border-gray-300 bg-white rounded-3xl p-10 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50/30 transition-all flex flex-col items-center justify-center min-h-[350px]">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-image text-2xl"></i>
                    </div>
                    <p class="text-gray-600 font-bold text-lg">拖曳或點擊上傳</p>
                    <p class="text-sm text-gray-400 mt-1">自動優化大圖，加速 AI 解析</p>
                </div>

                <div id="previewContainer" class="hidden bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden fade-in">
                    <div class="relative group">
                        <img id="imagePreview" src="" alt="預覽" class="w-full h-auto max-h-[400px] object-contain bg-gray-100">
                        <button id="clearBtn" class="absolute top-4 right-4 bg-white/90 backdrop-blur shadow-md w-10 h-10 rounded-full text-red-500 hover:bg-red-500 hover:text-white transition-all">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                    <div class="p-4 flex items-center justify-between text-sm">
                        <span id="fileInfo" class="text-gray-500 truncate mr-4 italic"></span>
                        <span id="compressInfo" class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold"></span>
                    </div>
                </div>

                <button id="analyzeBtn" disabled class="w-full py-5 bg-gray-900 text-white rounded-2xl font-bold text-lg shadow-xl hover:shadow-gray-200 disabled:bg-gray-200 disabled:shadow-none transition-all flex items-center justify-center gap-3">
                    <span id="btnText">啟動 AI 分析</span>
                    <i id="btnLoader" class="fa-solid fa-spinner loading-spin hidden"></i>
                </button>
            </div>

            <!-- Right Side: Results -->
            <div class="lg:col-span-7">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-200 p-8 min-h-[500px] flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-black flex items-center gap-2">
                            <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                            分析結果
                        </h2>
                        <div id="timer" class="text-xs font-mono text-gray-400 hidden">處理時間: <span id="seconds">0</span>s</div>
                        <button id="copyBtn" class="hidden w-10 h-10 rounded-xl bg-gray-50 text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-all">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div id="statusIndicator" class="hidden mb-4 p-3 bg-blue-50 text-blue-600 rounded-xl text-sm font-medium flex items-center gap-2">
                        <i class="fa-solid fa-bolt-lightning animate-pulse"></i>
                        <span id="statusText">正在進行壓縮與傳輸...</span>
                    </div>

                    <div id="placeholderText" class="flex-1 flex flex-col items-center justify-center text-gray-300 space-y-4">
                        <i class="fa-solid fa-brain text-6xl opacity-20"></i>
                        <p class="font-medium">待機中，請提供圖片與 API Key</p>
                    </div>

                    <div id="errorMessage" class="hidden p-5 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 flex items-start gap-3">
                        <i class="fa-solid fa-circle-exclamation mt-1"></i>
                        <span id="errorText"></span>
                    </div>

                    <div id="resultContent" class="hidden space-y-4 text-gray-700 leading-relaxed">
                        <!-- Content injection -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-50 font-bold text-sm"></div>

    <script>
        // --- 核心變數 ---
        let currentApiKey = "";
        let optimizedImageBase64 = null;
        let timerInterval = null;
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        // DOM 元素引用
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const compressInfo = document.getElementById('compressInfo');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultContent = document.getElementById('resultContent');
        const placeholderText = document.getElementById('placeholderText');
        const errorMessage = document.getElementById('errorMessage');
        const statusIndicator = document.getElementById('statusIndicator');
        const timerDisplay = document.getElementById('timer');

        // --- 功能模組 ---

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2500);
        }

        // 保存 API Key
        saveKeyBtn.addEventListener('click', () => {
            currentApiKey = apiKeyInput.value.trim();
            if (currentApiKey) {
                showToast("API Key 已成功載入");
                checkReady();
            }
        });

        // 圖片壓縮優化 (關鍵性能提升點)
        function optimizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 1024; // 限制長寬，足以識別但極大縮減體積

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 轉換為 WebP 格式並降低品質以加快傳輸
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        const base64 = dataUrl.split(',')[1];
                        
                        const originalKB = Math.round(file.size / 1024);
                        const optimizedKB = Math.round((base64.length * 0.75) / 1024);
                        
                        resolve({
                            base64,
                            dataUrl,
                            stats: `壓縮: ${originalKB}KB → ${optimizedKB}KB`
                        });
                    };
                };
            });
        }

        // 處理檔案
        async function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast("格式錯誤，請提供圖片");
                return;
            }

            statusIndicator.classList.remove('hidden');
            document.getElementById('statusText').innerText = "優化圖片體積中...";
            
            const result = await optimizeImage(file);
            optimizedImageBase64 = result.base64;
            imagePreview.src = result.dataUrl;
            compressInfo.innerText = result.stats;
            document.getElementById('fileInfo').innerText = file.name;
            
            dropZone.classList.add('hidden');
            previewContainer.classList.remove('hidden');
            statusIndicator.classList.add('hidden');
            checkReady();
        }

        // 事件綁定
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone--over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        document.getElementById('clearBtn').addEventListener('click', () => {
            optimizedImageBase64 = null;
            previewContainer.classList.add('hidden');
            dropZone.classList.remove('hidden');
            checkReady();
        });

        function checkReady() {
            analyzeBtn.disabled = !(currentApiKey && optimizedImageBase64);
        }

        // --- AI 通訊 ---

        async function fetchAIAnalysis(base64, retry = 0) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${currentApiKey}`;
            
            // 簡化 Prompt 使 AI 回覆更迅速且精確
            const body = {
                contents: [{
                    parts: [
                        { text: "這是一張圖片。請以繁體中文提供：1. 簡短描述 (1句)。2. 5個關鍵句子。3. 10個標籤。請使用清晰的 Markdown 格式。" },
                        { inlineData: { mimeType: "image/jpeg", data: base64 } }
                    ]
                }]
            };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.error?.message || "網路錯誤");
                }
                return await res.json();
            } catch (err) {
                if (retry < 3) {
                    await new Promise(r => setTimeout(r, 1000 * (retry + 1)));
                    return fetchAIAnalysis(base64, retry + 1);
                }
                throw err;
            }
        }

        // --- 啟動按鈕邏輯 ---

        analyzeBtn.addEventListener('click', async () => {
            // UI 重置
            analyzeBtn.disabled = true;
            document.getElementById('btnLoader').classList.remove('hidden');
            document.getElementById('btnText').innerText = "AI 正在思考...";
            errorMessage.classList.add('hidden');
            resultContent.classList.add('hidden');
            placeholderText.classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            
            // 計時器
            let sec = 0;
            document.getElementById('seconds').innerText = "0";
            timerDisplay.classList.remove('hidden');
            timerInterval = setInterval(() => {
                sec++;
                document.getElementById('seconds').innerText = sec;
            }, 1000);

            statusIndicator.classList.remove('hidden');
            document.getElementById('statusText').innerText = "正在傳輸優化後的圖像並等待回傳...";

            try {
                const data = await fetchAIAnalysis(optimizedImageBase64);
                const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (rawText) {
                    // 簡易 Markdown 轉換為 HTML
                    resultContent.innerHTML = rawText
                        .split('\n').map(line => {
                            if (line.startsWith('#')) return `<h3 class="text-lg font-black text-blue-600 mt-4">${line.replace(/#+\s*/, '')}</h3>`;
                            if (line.startsWith('-') || line.startsWith('*')) return `<div class="flex gap-2 items-start py-1"><span class="text-blue-400 mt-1.5 w-1.5 h-1.5 rounded-full bg-blue-400 shrink-0"></span><span>${line.replace(/^[-*]\s*/, '')}</span></div>`;
                            return line.trim() ? `<p class="mb-2">${line}</p>` : '';
                        }).join('');
                    
                    resultContent.classList.remove('hidden');
                    document.getElementById('copyBtn').classList.remove('hidden');
                } else {
                    throw new Error("AI 雖然接收了圖片，但沒有返回任何文字結果。");
                }
            } catch (err) {
                document.getElementById('errorText').innerText = err.message;
                errorMessage.classList.remove('hidden');
            } finally {
                clearInterval(timerInterval);
                analyzeBtn.disabled = false;
                document.getElementById('btnLoader').classList.add('hidden');
                document.getElementById('btnText').innerText = "再次分析";
                statusIndicator.classList.add('hidden');
            }
        });

        // 複製文字
        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = resultContent.innerText;
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast("分析結果已複製");
        });
    </script>
</body>
</html>
