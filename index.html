<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 圖像關鍵字生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .drop-zone--over { border-color: #3b82f6; background-color: #eff6ff; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">AI 圖像關鍵字生成器</h1>
            <p class="text-slate-600">上傳圖片，讓 AI 為您提取核心訊息與關鍵句子</p>
        </header>

        <!-- API Key Input -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
            <label class="block text-sm font-medium text-slate-700 mb-2">
                <i class="fa-solid fa-key mr-1"></i> Google Gemini API Key
            </label>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="請輸入您的 Gemini API Key..." 
                       class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                <button id="saveKeyBtn" class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors">
                    確認
                </button>
            </div>
            <p class="mt-2 text-xs text-slate-500">
                Key 將僅保存在目前的視窗中，不會被儲存至伺服器。
            </p>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Left: Upload Section -->
            <div class="space-y-6">
                <div id="dropZone" class="border-2 border-dashed border-slate-300 bg-white rounded-2xl p-8 text-center cursor-pointer hover:border-blue-400 transition-all flex flex-col items-center justify-center min-h-[300px]">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-400 mb-4"></i>
                    <p class="text-slate-600 font-medium">點擊或拖曳圖片至此</p>
                    <p class="text-xs text-slate-400 mt-2">支援 JPG, PNG, WEBP (最大 4MB)</p>
                </div>

                <div id="previewContainer" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <img id="imagePreview" src="" alt="預覽" class="w-full h-auto max-h-[400px] object-contain bg-slate-100">
                    <div class="p-4 border-t border-slate-100 flex justify-between items-center">
                        <span class="text-sm text-slate-500" id="fileName">image.jpg</span>
                        <button id="clearBtn" class="text-red-500 hover:text-red-600 text-sm font-medium">清除圖片</button>
                    </div>
                </div>

                <button id="analyzeBtn" disabled class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:bg-slate-300 disabled:shadow-none transition-all flex items-center justify-center gap-2">
                    <span id="btnText">開始分析圖片</span>
                    <i id="btnLoader" class="fa-solid fa-circle-notch loading-spin hidden"></i>
                </button>
            </div>

            <!-- Right: Results Section -->
            <div class="space-y-4">
                <div id="resultCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 min-h-[450px] relative">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-slate-800">分析結果</h2>
                        <button id="copyBtn" class="hidden text-slate-500 hover:text-blue-600" title="複製文字">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>

                    <div id="placeholderText" class="flex flex-col items-center justify-center h-full text-slate-400 space-y-2 mt-20">
                        <i class="fa-solid fa-wand-magic-sparkles text-4xl mb-2"></i>
                        <p>上傳圖片並點擊分析</p>
                    </div>

                    <div id="errorMessage" class="hidden p-4 bg-red-50 text-red-700 rounded-lg text-sm border border-red-100">
                        <!-- Error goes here -->
                    </div>

                    <div id="resultContent" class="prose prose-slate max-w-none hidden">
                        <!-- Markdown-like content from AI -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Box Overlay -->
    <div id="msgBox" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50">
        <span id="msgText"></span>
    </div>

    <script>
        // --- 初始化變數 ---
        let currentApiKey = "";
        let selectedImageBase64 = null;
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        // DOM 元素
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultContent = document.getElementById('resultContent');
        const placeholderText = document.getElementById('placeholderText');
        const errorMessage = document.getElementById('errorMessage');
        const btnLoader = document.getElementById('btnLoader');
        const btnText = document.getElementById('btnText');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const msgBox = document.getElementById('msgBox');
        const msgText = document.getElementById('msgText');

        // --- 功能函式 ---

        function showMessage(text) {
            msgText.innerText = text;
            msgBox.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                msgBox.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 處理 API Key
        saveKeyBtn.addEventListener('click', () => {
            currentApiKey = apiKeyInput.value.trim();
            if (currentApiKey) {
                showMessage("API Key 已更新");
                checkReady();
            }
        });

        // 處理檔案上傳
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => {
                dropZone.classList.remove('drop-zone--over');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage("請上傳圖片檔案");
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                selectedImageBase64 = reader.result.split(',')[1];
                imagePreview.src = reader.result;
                document.getElementById('fileName').innerText = file.name;
                
                dropZone.classList.add('hidden');
                previewContainer.classList.remove('hidden');
                checkReady();
            };
        }

        clearBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            imagePreview.src = "";
            fileInput.value = "";
            dropZone.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            checkReady();
        });

        function checkReady() {
            analyzeBtn.disabled = !(currentApiKey && selectedImageBase64);
        }

        // --- API 請求與重試機制 ---

        async function callGemini(base64Data, retryCount = 0) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${currentApiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "請仔細分析這張圖片。請先簡短描述圖片內容，接著列出 5-8 個關鍵句子（重點語句），最後列出 10 個核心關鍵字。請使用繁體中文回答，並使用清晰的條列格式。" },
                        { inlineData: { mimeType: "image/png", data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "請求失敗");
                }

                return await response.json();
            } catch (error) {
                if (retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(base64Data, retryCount + 1);
                }
                throw error;
            }
        }

        // --- 主程式執行 ---

        analyzeBtn.addEventListener('click', async () => {
            // UI 狀態切換
            analyzeBtn.disabled = true;
            btnLoader.classList.remove('hidden');
            btnText.innerText = "分析中...";
            errorMessage.classList.add('hidden');
            resultContent.classList.add('hidden');
            placeholderText.classList.add('hidden');
            copyBtn.classList.add('hidden');

            try {
                const result = await callGemini(selectedImageBase64);
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;

                if (text) {
                    // 將 Markdown 格式稍微處理成 HTML 顯示 (簡單處理)
                    resultContent.innerHTML = text
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/### (.*?)(<br>|$)/g, '<h3 class="text-xl font-bold mt-4 mb-2 text-blue-600">$1</h3>')
                        .replace(/## (.*?)(<br>|$)/g, '<h2 class="text-2xl font-bold mt-6 mb-3 border-b pb-1">$1</h2>');
                    
                    resultContent.classList.remove('hidden');
                    copyBtn.classList.remove('hidden');
                } else {
                    throw new Error("AI 未返回有效內容");
                }
            } catch (error) {
                errorMessage.innerText = `錯誤: ${error.message}`;
                errorMessage.classList.remove('hidden');
            } finally {
                analyzeBtn.disabled = false;
                btnLoader.classList.add('hidden');
                btnText.innerText = "重新分析";
            }
        });

        // 複製功能
        copyBtn.addEventListener('click', () => {
            const textToCopy = resultContent.innerText;
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showMessage("內容已複製到剪貼簿");
        });
    </script>
</body>
</html>
