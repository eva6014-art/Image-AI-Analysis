<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Factory - 影像解析</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F1F3F9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [showApiKey, setShowApiKey] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
                // 初始化圖示
                lucide.createIcons();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isSettingsOpen, analysis, isLoading, error]);

            const saveKey = (val) => {
                setApiKey(val);
                localStorage.setItem('gemini_api_key', val);
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => setBase64Image(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const content = `解析結果：${analysis.summary}\n\n1. 中文描述：\n風格：${analysis.chinese_details.style}\n情節：${analysis.chinese_details.subject}\n\n2. 英文 Prompts：\n${analysis.english_prompts.join(', ')}`;
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const analyzeImage = async () => {
                if (!apiKey) { setError("請先設定 API Key"); setIsSettingsOpen(true); return; }
                if (!base64Image) return;
                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度解析圖片並回傳 JSON 格式：{\"summary\":\"...\",\"chinese_details\":{\"style\":\"...\",\"subject\":\"...\"},\"english_prompts\":[\"...\"]}" },
                            { inlineData: { mimeType: "image/png", data: base64Image } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("API 請求失敗，請檢查 Key 是否正確");
                    const data = await response.json();
                    const rawText = data.candidates[0].content.parts[0].text;
                    setAnalysis(JSON.parse(rawText.replace(/```json|```/g, "").trim()));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-2xl mx-auto">
                        {/* API 設定 */}
                        <div className="mb-6 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="w-full px-6 py-4 flex items-center justify-between hover:bg-slate-50">
                                <span className="text-xs font-bold text-slate-500 tracking-widest">API 設定 {apiKey && "✅"}</span>
                                {isSettingsOpen ? <i data-lucide="chevron-up"></i> : <i data-lucide="chevron-down"></i>}
                            </button>
                            {isSettingsOpen && (
                                <div className="px-6 pb-6 pt-2">
                                    <input 
                                        type="password"
                                        placeholder="在此輸入 Gemini API Key"
                                        value={apiKey}
                                        onChange={(e) => saveKey(e.target.value)}
                                        className="w-full px-4 py-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"
                                    />
                                    <p className="mt-2 text-[10px] text-slate-400">Key 僅存於您的瀏覽器</p>
                                </div>
                            )}
                        </div>

                        {/* 標題 */}
                        <header className="mb-10 flex flex-col md:flex-row items-center gap-4">
                            <div className="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i data-lucide="sparkles"></i>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800">AI Prompt Factory</h1>
                        </header>

                        {/* 上傳區 */}
                        <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-200 mb-8">
                            <div 
                                onClick={() => document.getElementById('file-upload').click()}
                                className={`border-2 border-dashed rounded-[1.5rem] flex flex-col items-center justify-center min-h-[250px] cursor-pointer transition-all ${selectedImage ? 'bg-slate-50 border-indigo-200' : 'hover:border-indigo-400 hover:bg-indigo-50/20'}`}
                            >
                                {selectedImage ? <img src={selectedImage} className="max-h-[220px] rounded-lg shadow-md" /> : <div className="text-center text-slate-400"><i data-lucide="upload" className="mx-auto mb-2"></i>點擊上傳</div>}
                                <input id="file-upload" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                            </div>
                            <button onClick={analyzeImage} disabled={isLoading || !base64Image} className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 disabled:bg-slate-200">
                                {isLoading ? "解析中..." : "開始分析"}
                            </button>
                        </div>

                        {/* 錯誤顯示 */}
                        {error && <div className="mb-8 p-4 bg-red-50 text-red-600 rounded-2xl text-sm font-bold flex gap-2"><i data-lucide="alert-circle"></i>{error}</div>}

                        {/* 結果顯示 */}
                        {analysis && (
                            <div className="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                                <div className="p-8 border-b flex justify-between items-center">
                                    <h2 className="text-xl font-black italic text-indigo-600">RESULT</h2>
                                    <button onClick={copyToClipboard} className="px-4 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-indigo-600 transition-colors">
                                        {copied ? "已複製" : "複製內容"}
                                    </button>
                                </div>
                                <div className="p-8 space-y-8">
                                    <p className="text-slate-700 font-medium text-lg leading-relaxed">{analysis.summary}</p>
                                    <div className="space-y-4">
                                        <div>
                                            <h3 className="font-black text-slate-400 text-xs mb-2 uppercase tracking-widest">中文描述</h3>
                                            <p className="text-slate-600 mb-1"><span className="font-bold">風格：</span>{analysis.chinese_details.style}</p>
                                            <p className="text-slate-600"><span className="font-bold">情節：</span>{analysis.chinese_details.subject}</p>
                                        </div>
                                        <div>
                                            <h3 className="font-black text-slate-400 text-xs mb-2 uppercase tracking-widest">英文 Prompt</h3>
                                            <div className="bg-slate-50 p-4 rounded-xl font-mono text-sm text-indigo-600">{analysis.english_prompts.join(', ')}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
