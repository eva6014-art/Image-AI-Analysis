<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Factory | 專業影像解析</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
                setTimeout(() => lucide.createIcons(), 200);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isSettingsOpen, analysis, isLoading, error]);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImageContent({
                            data: reader.result.split(',')[1],
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { 
                    setError("請輸入 API Key。"); 
                    setIsSettingsOpen(true); 
                    return; 
                }
                if (!imageContent.data) {
                    setError("請先選擇一張圖片。");
                    return;
                }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                // 使用目前最穩定的 1.5-flash 模型
                const model = "gemini-1.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度解析這張圖片。請以繁體中文描述風格與情節，並提供英文提示詞。輸出格式必須嚴格遵守提供的 JSON Schema。" },
                            { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                        ]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                summary: { type: "STRING" },
                                chinese_details: {
                                    type: "OBJECT",
                                    properties: {
                                        style: { type: "STRING" },
                                        subject: { type: "STRING" }
                                    },
                                    required: ["style", "subject"]
                                },
                                english_prompts: {
                                    type: "ARRAY",
                                    items: { type: "STRING" }
                                }
                            },
                            required: ["summary", "chinese_details", "english_prompts"]
                        }
                    }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        const message = data.error?.message || "請求失敗";
                        const status = data.error?.status || response.status;
                        throw new Error(`${status}: ${message}`);
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("AI 未回傳任何內容，請確認您的 API Key 是否具備權限。");

                    setAnalysis(JSON.parse(rawText));
                } catch (err) {
                    console.error("Analysis Error:", err);
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const content = `解析結果：${analysis.summary}\n\n風格：${analysis.chinese_details.style}\n情節：${analysis.chinese_details.subject}\n\nPrompts：${analysis.english_prompts.join(', ')}`;
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-12 transition-all">
                    <div className="max-w-xl mx-auto">
                        
                        {/* 頂部設定選單 */}
                        <div className="mb-8 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div 
                                onClick={() => setIsSettingsOpen(!isSettingsOpen)} 
                                className="px-6 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors"
                            >
                                <div className="flex items-center gap-2">
                                    <i data-lucide="key" className="w-4 h-4 text-indigo-500"></i>
                                    <span className="text-[11px] font-black text-slate-500 uppercase tracking-widest">
                                        API 設定 {apiKey && "（已儲存）"}
                                    </span>
                                </div>
                                <i data-lucide={isSettingsOpen ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-slate-400"></i>
                            </div>
                            
                            {isSettingsOpen && (
                                <div className="px-6 pb-6 pt-2 space-y-4">
                                    <input 
                                        type="password"
                                        placeholder="在此貼上您的 Gemini API Key"
                                        value={apiKey}
                                        onChange={(e) => {
                                            const val = e.target.value.trim();
                                            setApiKey(val);
                                            localStorage.setItem('gemini_api_key', val);
                                        }}
                                        className="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono text-sm"
                                    />
                                    <div className="flex justify-between items-center text-[10px] text-slate-400">
                                        <p>Key 儲存在您的瀏覽器中</p>
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-500 font-bold hover:underline">獲取 API Key</a>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 標題 */}
                        <header className="mb-10 text-center">
                            <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-indigo-100 mx-auto mb-6 transform rotate-2">
                                <i data-lucide="sparkles" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tighter">AI PROMPT LAB</h1>
                            <p className="text-slate-400 text-xs font-bold mt-2 tracking-widest uppercase">Visual Analysis Engine</p>
                        </header>

                        {/* 上傳與操作 */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 mb-8 transition-transform hover:shadow-md">
                            <div 
                                onClick={() => document.getElementById('upload').click()}
                                className={`border-2 border-dashed rounded-[2rem] min-h-[300px] flex flex-col items-center justify-center transition-all overflow-hidden cursor-pointer ${selectedImage ? 'bg-slate-50 border-indigo-200 shadow-inner' : 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/20'}`}
                            >
                                {selectedImage ? (
                                    <img src={selectedImage} className="max-h-[260px] object-contain rounded-xl" />
                                ) : (
                                    <div className="text-center opacity-40 group hover:opacity-100 transition-opacity">
                                        <i data-lucide="image" className="w-12 h-12 mx-auto mb-4 text-slate-300"></i>
                                        <p className="text-slate-500 font-bold">選擇圖片進行解析</p>
                                    </div>
                                )}
                                <input id="upload" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                            </div>
                            
                            <button 
                                onClick={analyzeImage} 
                                disabled={isLoading || !imageContent.data}
                                className={`w-full mt-8 py-5 rounded-[1.5rem] font-black text-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98] shadow-xl ${isLoading || !imageContent.data ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}
                            >
                                {isLoading ? (
                                    <><i data-lucide="loader-2" className="animate-spin w-6 h-6"></i> 分析中...</>
                                ) : (
                                    <>開始分析影像</>
                                )}
                            </button>
                        </div>

                        {/* 錯誤顯示 */}
                        {error && (
                            <div className="mb-8 p-6 bg-red-50 border border-red-100 rounded-3xl animate-in zoom-in-95">
                                <div className="flex gap-4">
                                    <i data-lucide="alert-circle" className="text-red-500 w-6 h-6 shrink-0"></i>
                                    <div>
                                        <h4 className="font-black text-red-700 uppercase text-xs">API 錯誤訊息</h4>
                                        <p className="text-xs text-red-600 font-bold mt-1 break-words leading-relaxed">{error}</p>
                                        <div className="mt-4 p-3 bg-white/50 rounded-xl text-[10px] text-red-500 font-medium">
                                            請確認您的 API Key 是否開通、網路是否連線，或更換圖片再試。
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 結果顯示 */}
                        {analysis && (
                            <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden animate-in slide-in-from-bottom-8 duration-700">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-6 bg-indigo-600 rounded-full"></div>
                                        <h2 className="text-xl font-black italic text-slate-800 tracking-tight">ANALYSIS</h2>
                                    </div>
                                    <button onClick={copyToClipboard} className={`px-5 py-3 rounded-2xl text-xs font-black transition-all flex items-center gap-2 ${copied ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-slate-900 text-white hover:bg-indigo-600 shadow-xl shadow-indigo-100'}`}>
                                        <i data-lucide={copied ? "check" : "copy"} className="w-3 h-3"></i>
                                        {copied ? "已複製" : "複製內容"}
                                    </button>
                                </div>
                                <div className="p-10 space-y-12">
                                    <p className="text-slate-700 font-bold text-2xl leading-tight tracking-tight">{analysis.summary}</p>
                                    
                                    <div className="space-y-12">
                                        <section>
                                            <h3 className="font-black text-indigo-500 text-[10px] mb-4 uppercase tracking-[0.3em] flex items-center gap-2">
                                                <i data-lucide="languages" className="w-3 h-3"></i> 中文深度描述
                                            </h3>
                                            <div className="space-y-8 pl-2 border-l-2 border-slate-100">
                                                <div>
                                                    <span className="text-[10px] font-black text-slate-300 block uppercase mb-1">Style & Composition</span>
                                                    <p className="text-slate-600 font-medium leading-relaxed text-lg">{analysis.chinese_details.style}</p>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] font-black text-slate-300 block uppercase mb-1">Subject Matter</span>
                                                    <p className="text-slate-600 font-medium leading-relaxed text-lg">{analysis.chinese_details.subject}</p>
                                                </div>
                                            </div>
                                        </section>

                                        <section>
                                            <h3 className="font-black text-indigo-500 text-[10px] mb-4 uppercase tracking-[0.3em] flex items-center gap-2">
                                                <i data-lucide="terminal" className="w-3 h-3"></i> 英文提示詞 (Prompts)
                                            </h3>
                                            <div className="bg-slate-900 p-8 rounded-[2rem] font-mono text-sm text-indigo-300 leading-relaxed shadow-inner">
                                                {analysis.english_prompts.join(', ')}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
