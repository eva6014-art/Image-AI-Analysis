<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Lab - 終極穩定版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .result-card { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
            }, []);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImageContent({
                            data: reader.result.split(',')[1],
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { setError("請設定 API Key"); setIsSettingsOpen(true); return; }
                if (!imageContent.data) { setError("請上傳圖片"); return; }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                // 使用 v1beta 端點 (Flash 支援度最高)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度解析圖片。請以繁體中文描述風格與情節，並提供英文提示詞清單。輸出必須是純 JSON，格式如下：{\"summary\":\"總結\",\"chinese_details\":{\"style\":\"風格描述\",\"subject\":\"情節描述\"},\"english_prompts\":[\"p1\",\"p2\"]}" },
                            { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                        ]
                    }]
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        const message = data.error?.message || "未知 API 錯誤";
                        throw new Error(`[${response.status}] ${message}`);
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("AI 未能產出內容，可能是安全過濾器攔截。");

                    // 強化 JSON 解析
                    try {
                        const jsonPart = rawText.match(/\{[\s\S]*\}/);
                        if (!jsonPart) throw new Error("回傳格式非 JSON");
                        const parsed = JSON.parse(jsonPart[0]);
                        setAnalysis(parsed);
                    } catch (pErr) {
                        console.error("RAW DATA:", rawText);
                        setError(`解析失敗。AI 原始回傳：${rawText.substring(0, 100)}...`);
                    }

                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const text = `${analysis.summary}\n\n風格：${analysis.chinese_details?.style}\n情節：${analysis.chinese_details?.subject}`;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-2xl mx-auto px-4 py-10">
                    {/* API Settings */}
                    <div className="bg-white rounded-2xl shadow-sm border mb-8 overflow-hidden">
                        <div 
                            onClick={() => setIsSettingsOpen(!isSettingsOpen)}
                            className="p-4 flex justify-between items-center cursor-pointer bg-slate-50 hover:bg-slate-100"
                        >
                            <span className="text-[10px] font-black text-slate-500 tracking-widest uppercase">API Configuration {apiKey && "✅"}</span>
                            <span className="text-xs">{isSettingsOpen ? "▲" : "▼"}</span>
                        </div>
                        {isSettingsOpen && (
                            <div className="p-5 space-y-3">
                                <input 
                                    type="password"
                                    placeholder="貼上您的 Gemini API Key"
                                    value={apiKey}
                                    onChange={(e) => {
                                        const val = e.target.value.trim();
                                        setApiKey(val);
                                        localStorage.setItem('gemini_api_key', val);
                                    }}
                                    className="w-full p-4 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs shadow-inner"
                                />
                                <div className="flex justify-between text-[10px] text-slate-400 font-bold px-1">
                                    <span>本地儲存模式</span>
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-600">取得新 KEY →</a>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Logo */}
                    <div className="text-center mb-12">
                        <div className="w-16 h-16 bg-slate-900 text-white rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 text-3xl font-black shadow-2xl ring-8 ring-indigo-50">A</div>
                        <h1 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Prompt Lab</h1>
                    </div>

                    {/* Image Area */}
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 mb-8">
                        <div 
                            onClick={() => document.getElementById('file-upload').click()}
                            className={`border-4 border-double rounded-[2rem] min-h-[320px] flex items-center justify-center cursor-pointer transition-all ${selectedImage ? 'bg-slate-50 border-indigo-200' : 'border-slate-200 hover:border-indigo-400'}`}
                        >
                            {selectedImage ? (
                                <img src={selectedImage} className="max-h-[280px] object-contain rounded-2xl" />
                            ) : (
                                <div className="text-center space-y-3 opacity-20">
                                    <p className="text-5xl">📷</p>
                                    <p className="font-black text-xs uppercase tracking-widest">Select Image</p>
                                </div>
                            )}
                            <input id="file-upload" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                        </div>
                        
                        <button 
                            onClick={analyzeImage}
                            disabled={isLoading || !imageContent.data}
                            className={`w-full mt-8 py-5 rounded-2xl font-black text-xl transition-all shadow-xl active:scale-95 ${isLoading || !imageContent.data ? 'bg-slate-100 text-slate-300' : 'bg-slate-900 text-white hover:bg-indigo-600 shadow-indigo-100'}`}
                        >
                            {isLoading ? "PROSESSING..." : "開始深度分析"}
                        </button>
                    </div>

                    {/* Error Box */}
                    {error && (
                        <div className="p-6 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-xs font-bold mb-8 animate-up flex gap-4">
                            <span className="text-xl">⚠️</span>
                            <div className="overflow-hidden">
                                <p className="mb-1 uppercase tracking-wider">Debug Log:</p>
                                <p className="opacity-75 font-mono break-words leading-relaxed">{error}</p>
                            </div>
                        </div>
                    )}

                    {/* Result Card */}
                    {analysis && (
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden result-card">
                            <div className="p-8 border-b bg-slate-50 flex justify-between items-center">
                                <h2 className="font-black text-slate-900 italic uppercase">Analysis Result</h2>
                                <button onClick={copyToClipboard} className={`px-5 py-2 rounded-xl text-[10px] font-black transition-all ${copied ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-900 text-white'}`}>
                                    {copied ? "COPIED" : "COPY DATA"}
                                </button>
                            </div>
                            <div className="p-10 md:p-14 space-y-12">
                                <p className="font-bold text-2xl tracking-tight text-slate-900 leading-tight">{analysis.summary}</p>
                                
                                <div className="space-y-12">
                                    <section className="pl-6 border-l-4 border-indigo-500">
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6 italic">Chinese Description</h3>
                                        <div className="space-y-6">
                                            <div className="space-y-1">
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Style & Composition</span>
                                                <p className="text-slate-700 font-medium text-lg leading-relaxed">{analysis.chinese_details?.style}</p>
                                            </div>
                                            <div className="space-y-1">
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Subject Matter</span>
                                                <p className="text-slate-700 font-medium text-lg leading-relaxed">{analysis.chinese_details?.subject}</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section>
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6 italic">Prompt Keywords</h3>
                                        <div className="bg-slate-900 p-8 rounded-[2rem] font-mono text-sm text-indigo-300 leading-relaxed shadow-inner">
                                            {Array.isArray(analysis.english_prompts) ? analysis.english_prompts.join(', ') : analysis.english_prompts}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 text-center text-slate-300 text-[9px] font-black tracking-[0.4em] uppercase">
                        AI Vision Lab v1.3
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
