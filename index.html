<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Factory - 專業版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [base64Image, setBase64Image] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isSettingsOpen, analysis, isLoading, error]);

            const saveKey = (val) => {
                const trimmedKey = val.trim(); // 自動過濾前後空格
                setApiKey(trimmedKey);
                localStorage.setItem('gemini_api_key', trimmedKey);
            };

            const clearKey = () => {
                setApiKey('');
                localStorage.removeItem('gemini_api_key');
                setIsSettingsOpen(true);
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => setBase64Image(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { 
                    setError("請輸入 API Key。"); 
                    setIsSettingsOpen(true); 
                    return; 
                }
                if (!base64Image) {
                    setError("請選擇一張圖片。");
                    return;
                }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                const model = "gemini-1.5-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度分析此圖，輸出 JSON 格式：{\"summary\":\"總結\",\"chinese_details\":{\"style\":\"風格描述\",\"subject\":\"情節描述\"},\"english_prompts\":[\"p1\",\"p2\"]}" },
                            { inlineData: { mimeType: "image/png", data: base64Image } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        // 擷取具體的 API 錯誤代碼與訊息
                        const status = data.error?.status || "ERROR";
                        const message = data.error?.message || "未知請求錯誤";
                        throw new Error(`${status}: ${message}`);
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setAnalysis(JSON.parse(rawText.replace(/```json|```/g, "").trim()));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const content = `解析結果：${analysis.summary}\n\n風格：${analysis.chinese_details.style}\n情節：${analysis.chinese_details.subject}\n\nPrompts：${analysis.english_prompts.join(', ')}`;
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-12 transition-colors">
                    <div className="max-w-xl mx-auto">
                        
                        {/* 頂部設定選單 */}
                        <div className="mb-8 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                            <div 
                                onClick={() => setIsSettingsOpen(!isSettingsOpen)} 
                                className="px-6 py-4 flex items-center justify-between cursor-pointer hover:bg-slate-50"
                            >
                                <div className="flex items-center gap-2">
                                    <i data-lucide="settings" className="w-4 h-4 text-slate-400"></i>
                                    <span className="text-[11px] font-black text-slate-500 uppercase tracking-widest">
                                        API Settings {apiKey && "✅"}
                                    </span>
                                </div>
                                <i data-lucide={isSettingsOpen ? "chevron-up" : "chevron-down"} className="w-4 h-4"></i>
                            </div>
                            
                            {isSettingsOpen && (
                                <div className="px-6 pb-6 pt-2 space-y-4">
                                    <div className="relative">
                                        <input 
                                            type="password"
                                            placeholder="在此貼上您的 Gemini API Key"
                                            value={apiKey}
                                            onChange={(e) => saveKey(e.target.value)}
                                            className="w-full pl-4 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono text-sm"
                                        />
                                        {apiKey && (
                                            <button onClick={clearKey} className="absolute right-4 top-1/2 -translate-y-1/2 text-red-400 hover:text-red-600 font-bold text-xs uppercase">
                                                清除
                                            </button>
                                        )}
                                    </div>
                                    <div className="flex justify-between items-center px-1">
                                        <p className="text-[10px] text-slate-400">金鑰僅存於瀏覽器，不經伺服器</p>
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-[10px] text-indigo-500 font-bold hover:underline">獲取新 Key →</a>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 標題與 LOGO */}
                        <header className="mb-12 text-center">
                            <div className="bg-indigo-600 w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-white shadow-2xl shadow-indigo-200 mx-auto mb-6 transform rotate-3">
                                <i data-lucide="sparkles" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tighter uppercase">AI Prompt Factory</h1>
                            <p className="text-slate-400 text-xs font-bold mt-2 tracking-[0.2em]">Advanced Visual Intelligence Lab</p>
                        </header>

                        {/* 核心功能區 */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 mb-8">
                            <div 
                                onClick={() => document.getElementById('upload').click()}
                                className={`border-2 border-dashed rounded-[2rem] min-h-[320px] flex flex-col items-center justify-center transition-all overflow-hidden cursor-pointer ${selectedImage ? 'bg-slate-50 border-indigo-200' : 'border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/20'}`}
                            >
                                {selectedImage ? (
                                    <img src={selectedImage} className="max-h-[280px] object-contain shadow-lg rounded-xl" />
                                ) : (
                                    <div className="text-center group">
                                        <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                                            <i data-lucide="image" className="text-slate-300 w-8 h-8"></i>
                                        </div>
                                        <p className="text-slate-500 font-bold text-lg">選擇或拖曳圖片</p>
                                    </div>
                                )}
                                <input id="upload" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                            </div>
                            
                            <button 
                                onClick={analyzeImage} 
                                disabled={isLoading || !base64Image}
                                className={`w-full mt-8 py-5 rounded-[1.5rem] font-black text-xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl ${isLoading || !base64Image ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}
                            >
                                {isLoading ? (
                                    <><i data-lucide="loader-2" className="animate-spin w-6 h-6"></i> 深度分析中...</>
                                ) : (
                                    <>開始分析</>
                                )}
                            </button>
                        </div>

                        {/* 診斷級錯誤訊息 */}
                        {error && (
                            <div className="mb-8 p-6 bg-red-50 border-2 border-red-100 rounded-3xl animate-in zoom-in-95">
                                <div className="flex gap-4">
                                    <i data-lucide="alert-circle" className="text-red-500 w-6 h-6 shrink-0 mt-0.5"></i>
                                    <div>
                                        <h4 className="font-black text-red-700 uppercase text-sm tracking-wider">診斷：請求失敗</h4>
                                        <p className="text-xs text-red-600 font-bold mt-1 opacity-80 leading-relaxed break-words">{error}</p>
                                        <div className="mt-4 p-3 bg-white/50 rounded-xl border border-red-100 text-[10px] text-red-500 font-medium">
                                            提示：若看到 403，請確認 API Key 有無打錯或過期。
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 解析結果顯示 */}
                        {analysis && (
                            <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden animate-in slide-in-from-bottom-8 duration-700">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h2 className="text-xl font-black italic text-slate-800">ANALYSIS</h2>
                                    <button onClick={copyToClipboard} className={`px-5 py-3 rounded-2xl text-xs font-black transition-all ${copied ? 'bg-emerald-500 text-white' : 'bg-slate-900 text-white hover:bg-indigo-600'}`}>
                                        {copied ? "已複製" : "複製內容"}
                                    </button>
                                </div>
                                <div className="p-10 space-y-12">
                                    <p className="text-slate-700 font-bold text-2xl leading-tight tracking-tight">{analysis.summary}</p>
                                    
                                    <div className="space-y-10">
                                        <section>
                                            <h3 className="font-black text-indigo-500 text-[10px] mb-4 uppercase tracking-[0.3em] flex items-center gap-2">
                                                <div className="w-1 h-3 bg-indigo-500"></div> 中文深度描述
                                            </h3>
                                            <div className="space-y-6 pl-2">
                                                <div>
                                                    <span className="text-[10px] font-black text-slate-300 block uppercase mb-1">Style</span>
                                                    <p className="text-slate-600 font-medium leading-relaxed text-lg">{analysis.chinese_details.style}</p>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] font-black text-slate-300 block uppercase mb-1">Subject</span>
                                                    <p className="text-slate-600 font-medium leading-relaxed text-lg">{analysis.chinese_details.subject}</p>
                                                </div>
                                            </div>
                                        </section>

                                        <section>
                                            <h3 className="font-black text-indigo-500 text-[10px] mb-4 uppercase tracking-[0.3em] flex items-center gap-2">
                                                <div className="w-1 h-3 bg-indigo-500"></div> 英文 Prompts
                                            </h3>
                                            <div className="bg-slate-900 p-8 rounded-[2rem] font-mono text-sm text-indigo-300 leading-relaxed shadow-inner">
                                                {analysis.english_prompts.join(', ')}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <footer className="mt-12 text-center opacity-20 hover:opacity-100 transition-opacity">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Gemini 1.5 Flash Vision Engine</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
