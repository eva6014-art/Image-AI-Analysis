<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Lab - 穩定版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);
            const [selectedImage, setSelectedImage] = useState(null);
            const [imageContent, setImageContent] = useState({ data: null, mimeType: null });
            const [isLoading, setIsLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            // 初始化載入 Key
            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setIsSettingsOpen(false);
                }
            }, []);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(URL.createObjectURL(file));
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImageContent({
                            data: reader.result.split(',')[1],
                            mimeType: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                    setError(null);
                    setAnalysis(null);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) { setError("請先輸入 API Key。"); setIsSettingsOpen(true); return; }
                if (!imageContent.data) { setError("請選擇圖片。"); return; }

                setIsLoading(true);
                setError(null);
                setAnalysis(null);

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "深度解析圖片。請以繁體中文描述風格與情節。必須回傳 JSON：{\"summary\":\"總結\",\"chinese_details\":{\"style\":\"風格\",\"subject\":\"情節\"},\"english_prompts\":[\"p1\"]}" },
                            { inlineData: { mimeType: imageContent.mimeType, data: imageContent.data } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || `HTTP ${response.status}`);
                    }

                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("AI 未能回傳結果，請檢查 Key 權限。");

                    // 安全解析 JSON
                    try {
                        const parsedData = JSON.parse(rawText.replace(/```json|```/g, "").trim());
                        setAnalysis(parsedData);
                    } catch (parseErr) {
                        console.error("JSON Parse Error:", rawText);
                        throw new Error("AI 回傳格式不正確，請再試一次。");
                    }

                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const copyToClipboard = () => {
                if (!analysis) return;
                const text = `${analysis.summary}\n\n風格：${analysis.chinese_details?.style}\n情節：${analysis.chinese_details?.subject}`;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-xl mx-auto px-4 py-8">
                    {/* API 設定 */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 overflow-hidden text-sm">
                        <div 
                            onClick={() => setIsSettingsOpen(!isSettingsOpen)}
                            className="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50"
                        >
                            <span className="font-bold text-slate-500 tracking-widest uppercase text-[10px]">⚙️ API Key 設定 {apiKey && "✅"}</span>
                            <span>{isSettingsOpen ? "▲" : "▼"}</span>
                        </div>
                        {isSettingsOpen && (
                            <div className="p-4 pt-0">
                                <input 
                                    type="password"
                                    placeholder="貼上您的 Gemini API Key"
                                    value={apiKey}
                                    onChange={(e) => {
                                        const val = e.target.value.trim();
                                        setApiKey(val);
                                        localStorage.setItem('gemini_api_key', val);
                                    }}
                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs"
                                />
                                <div className="mt-2 flex justify-between text-[10px] text-slate-400">
                                    <span>Key 儲存於本地</span>
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-500 font-bold">獲取 Key →</a>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 標題 */}
                    <header className="text-center mb-10">
                        <div className="inline-block bg-indigo-600 p-4 rounded-2xl text-white shadow-xl mb-4">✨</div>
                        <h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">AI Prompt Factory</h1>
                        <p className="text-slate-400 text-[10px] font-bold tracking-widest mt-1 uppercase">Visual Intelligence Laboratory</p>
                    </header>

                    {/* 上傳與按鈕 */}
                    <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200 mb-6">
                        <div 
                            onClick={() => document.getElementById('upload').click()}
                            className={`border-2 border-dashed rounded-2xl min-h-[280px] flex items-center justify-center cursor-pointer overflow-hidden transition-all ${selectedImage ? 'bg-slate-50 border-indigo-200' : 'border-slate-200 hover:bg-indigo-50/20'}`}
                        >
                            {selectedImage ? (
                                <img src={selectedImage} className="max-h-[260px] object-contain rounded-lg" />
                            ) : (
                                <div className="text-center text-slate-300">
                                    <div className="text-4xl mb-2">🖼️</div>
                                    <p className="font-bold text-sm">選擇圖片</p>
                                </div>
                            )}
                            <input id="upload" type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                        </div>
                        
                        <button 
                            onClick={analyzeImage}
                            disabled={isLoading || !imageContent.data}
                            className={`w-full mt-6 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all ${isLoading || !imageContent.data ? 'bg-slate-100 text-slate-300' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}
                        >
                            {isLoading ? "請稍候..." : "開始分析"}
                        </button>
                    </div>

                    {/* 錯誤提示 */}
                    {error && (
                        <div className="p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-xs font-bold mb-6 flex gap-2 items-start">
                            <span>⚠️</span>
                            <div>
                                <p>失敗原因：</p>
                                <p className="opacity-70 mt-1 break-words">{error}</p>
                            </div>
                        </div>
                    )}

                    {/* 解析結果 */}
                    {analysis && (
                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-fade-in">
                            <div className="p-6 border-b bg-slate-50 flex justify-between items-center">
                                <h2 className="font-black italic text-slate-800">ANALYSIS</h2>
                                <button onClick={copyToClipboard} className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all ${copied ? 'bg-emerald-500 text-white' : 'bg-slate-900 text-white hover:bg-indigo-600'}`}>
                                    {copied ? "已複製" : "複製全部"}
                                </button>
                            </div>
                            <div className="p-8 space-y-8">
                                <p className="text-slate-700 font-bold text-lg leading-tight">{analysis?.summary}</p>
                                
                                <div className="space-y-6">
                                    <div className="pl-4 border-l-2 border-indigo-500">
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">中文深度描述</h3>
                                        <p className="text-slate-600 text-sm mb-3"><b>風格：</b>{analysis?.chinese_details?.style}</p>
                                        <p className="text-slate-600 text-sm"><b>情節：</b>{analysis?.chinese_details?.subject}</p>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">英文 Prompts</h3>
                                        <div className="bg-slate-900 p-5 rounded-2xl font-mono text-[11px] text-indigo-300 leading-relaxed shadow-inner">
                                            {Array.isArray(analysis?.english_prompts) ? analysis.english_prompts.join(', ') : analysis?.english_prompts}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <footer className="mt-12 text-center text-slate-300 text-[9px] font-black tracking-[0.2em] uppercase">
                        Stable Vision Engine v1.1
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
